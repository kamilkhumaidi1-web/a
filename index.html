<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi | Modern Digital School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --navy-primary: #0F172A;
            --navy-secondary: #1E293B;
            --accent-blue: #3B82F6;
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .sidebar-item-active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0) 100%);
            border-left: 4px solid var(--accent-blue);
            color: #3B82F6 !important;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .btn-primary {
            background-color: var(--navy-primary);
            transition: all 0.3s ease;
        }

        /* Animasi Transisi Konten */
        .page-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

    <div id="app">
        <!-- Overlay Loading -->
        <div id="loader" class="loading-overlay hidden">
            <div class="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-sm font-semibold text-slate-700">Sinkronisasi Data...</p>
            </div>
        </div>

        <!-- Layar Login -->
        <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 bg-slate-900 relative">
            <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
            <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl p-10 relative z-10">
                <div class="text-center mb-10">
                    <div class="bg-slate-900 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl">
                        <i data-lucide="shield-check" class="text-blue-400 w-8 h-8"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-900">E-Portal Absensi</h1>
                    <p class="text-slate-500 mt-1 text-sm font-medium">Digital School Ecosystem</p>
                </div>
                <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Username</label>
                        <input type="text" id="username" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin / guru" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Password</label>
                        <input type="password" id="password" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="w-full btn-primary text-white py-4 rounded-xl font-bold shadow-lg mt-4 active:scale-95 transition-all">
                        Masuk Sistem
                    </button>
                </form>
            </div>
        </div>

        <!-- Layout Utama -->
        <div id="main-layout" class="hidden h-screen flex overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-72 bg-slate-900 text-white flex-shrink-0 flex flex-col">
                <div class="p-8 flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg">
                        <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <span class="font-black text-xl tracking-tighter block">SISKO</span>
                        <span class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Digital Service</span>
                    </div>
                </div>
                
                <div class="px-4 py-4 flex-1 overflow-y-auto">
                    <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Menu Utama</p>
                    <nav class="space-y-1" id="sidebar-nav"></nav>
                </div>

                <div class="p-6 border-t border-slate-800">
                    <button onclick="logout()" class="flex items-center gap-3 text-rose-400 hover:bg-rose-500/10 w-full p-3 rounded-xl transition font-semibold text-sm">
                        <i data-lucide="power" class="w-4 h-4"></i>
                        <span>Keluar Sistem</span>
                    </button>
                </div>
            </aside>

            <!-- Area Konten -->
            <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
                <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center">
                    <div>
                        <h2 id="page-title" class="text-xl font-bold text-slate-900">Dashboard</h2>
                        <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">
                            <span id="breadcrumb-parent">Admin</span>
                            <i data-lucide="chevron-right" class="w-3 h-3"></i>
                            <span class="text-blue-600" id="breadcrumb-page">Dashboard</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <div class="text-right hidden sm:block">
                            <p id="user-display" class="font-bold text-sm text-slate-900 leading-none">User</p>
                            <p id="role-display" class="text-[9px] text-blue-600 font-black uppercase mt-1">Role</p>
                        </div>
                        <div class="h-10 w-10 rounded-xl bg-slate-900 flex items-center justify-center text-white font-bold text-xs">
                            <span id="user-initial">A</span>
                        </div>
                    </div>
                </header>

                <div id="content-container" class="flex-1 overflow-y-auto p-8">
                    <!-- Konten dinamis akan masuk ke sini -->
                </div>
            </main>
        </div>
    </div>

    <script>
        let currentUser = null;
        let activePage = 'dashboard';

        // Inisialisasi awal
        window.onload = () => {
            lucide.createIcons();
            const savedUser = localStorage.getItem('absensi_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showMainLayout();
            }
        };

        function handleLogin(e) {
            e.preventDefault();
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;

            if ((userVal === 'admin' && passVal === 'admin') || (userVal === 'guru' && passVal === 'guru')) {
                currentUser = {
                    username: userVal,
                    role: userVal === 'admin' ? 'admin' : 'guru',
                    name: userVal === 'admin' ? 'Administrator Utama' : 'Guru Pengajar'
                };
                localStorage.setItem('absensi_user', JSON.stringify(currentUser));
                showMainLayout();
            } else {
                alert('Username atau password salah (Gunakan admin/admin atau guru/guru)');
            }
        }

        function logout() {
            localStorage.removeItem('absensi_user');
            location.reload();
        }

        function showMainLayout() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-layout').classList.remove('hidden');
            
            document.getElementById('user-display').innerText = currentUser.name;
            document.getElementById('role-display').innerText = currentUser.role === 'admin' ? 'Administrator Sistem' : 'Guru Pengajar';
            document.getElementById('user-initial').innerText = currentUser.name.charAt(0);
            
            renderSidebar();
            navigate('dashboard');
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            const menu = [
                { id: 'dashboard', label: 'Dashboard', icon: 'grid', roles: ['admin', 'guru'] },
                { id: 'absensi', label: 'Input Absensi', icon: 'clipboard-list', roles: ['admin', 'guru'] },
                { id: 'rekap', label: 'Rekap Kehadiran', icon: 'bar-chart-3', roles: ['admin', 'guru'] },
                { id: 'kelas', label: 'Kelola Kelas', icon: 'layers', roles: ['admin'] },
                { id: 'siswa', label: 'Data Siswa', icon: 'users', roles: ['admin'] },
                { id: 'pengguna', label: 'Pengguna', icon: 'shield', roles: ['admin'] },
            ];

            nav.innerHTML = menu
                .filter(item => item.roles.includes(currentUser.role))
                .map(item => `
                    <button onclick="navigate('${item.id}')" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl transition group font-semibold text-sm ${activePage === item.id ? 'sidebar-item-active' : 'text-slate-400 hover:text-white hover:bg-slate-800'}">
                        <i data-lucide="${item.icon}" class="w-4 h-4 ${activePage === item.id ? 'text-blue-500' : 'text-slate-500'}"></i>
                        <span>${item.label}</span>
                    </button>
                `).join('');
            lucide.createIcons();
        }

        function navigate(page) {
            activePage = page;
            renderSidebar();
            
            const container = document.getElementById('content-container');
            const breadcrumb = document.getElementById('breadcrumb-page');
            const pageTitle = document.getElementById('page-title');
            
            const titles = {
                dashboard: "Dashboard Utama",
                absensi: "Input Absensi Harian",
                rekap: "Rekapitulasi Kehadiran",
                kelas: "Manajemen Kelas",
                siswa: "Database Siswa",
                pengguna: "Hak Akses Pengguna"
            };

            pageTitle.innerText = titles[page];
            breadcrumb.innerText = titles[page];
            container.innerHTML = `<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div></div>`;

            // Simulasi loading konten
            setTimeout(() => {
                container.classList.remove('page-fade-in');
                void container.offsetWidth; // Trigger reflow
                container.classList.add('page-fade-in');

                switch(page) {
                    case 'dashboard': renderDashboard(container); break;
                    case 'absensi': renderAbsensi(container); break;
                    case 'rekap': renderRekap(container); break;
                    default: renderPlaceholder(container, titles[page]); break;
                }
            }, 300);
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    ${createStatCard('Total Siswa', '1.240', 'users', 'blue')}
                    ${createStatCard('Hadir Hari Ini', '1.180', 'user-check', 'emerald')}
                    ${createStatCard('Izin/Sakit', '42', 'info', 'amber')}
                    ${createStatCard('Tanpa Keterangan', '18', 'user-x', 'rose')}
                </div>
                <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                    <h3 class="font-bold text-lg mb-4 text-slate-900">Aktivitas Terbaru</h3>
                    <div class="space-y-4">
                        ${[1,2,3].map(() => `
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm"><i data-lucide="check" class="text-emerald-500 w-5 h-5"></i></div>
                                    <div>
                                        <p class="font-bold text-sm text-slate-900">Absensi Kelas X MIPA 1 Selesai</p>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase mt-0.5">Oleh: Bp. Budi • 5 Menit Lalu</p>
                                    </div>
                                </div>
                                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">CLOUD SYNCED</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function createStatCard(label, val, icon, color) {
            const colors = {
                blue: 'bg-blue-50 text-blue-600',
                emerald: 'bg-emerald-50 text-emerald-600',
                amber: 'bg-amber-50 text-amber-600',
                rose: 'bg-rose-50 text-rose-600'
            };
            return `
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <div class="w-10 h-10 ${colors[color]} rounded-xl flex items-center justify-center mb-4">
                        <i data-lucide="${icon}" class="w-5 h-5"></i>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${label}</p>
                    <p class="text-2xl font-black text-slate-900 mt-1">${val}</p>
                </div>
            `;
        }

        function renderAbsensi(container) {
            container.innerHTML = `
                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6 bg-slate-50 border-b border-slate-200 flex flex-wrap gap-4">
                        <div class="flex-1 min-w-[200px]">
                            <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Pilih Kelas</label>
                            <select class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none" onchange="loadStudentList()">
                                <option value="">-- Pilih Kelas --</option>
                                <option>X MIPA 1</option><option>X MIPA 2</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[200px]">
                            <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Tanggal</label>
                            <input type="date" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none" value="${new Date().toISOString().split('T')[0]}">
                        </div>
                    </div>
                    <div id="student-list" class="p-8 text-center text-slate-400 italic text-sm">
                        Silakan pilih kelas untuk memuat daftar siswa.
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function loadStudentList() {
            const list = document.getElementById('student-list');
            const mockStudents = [
                { nis: '101', name: 'ADITYA PRATAMA' },
                { nis: '102', name: 'BELLA SAFIRA' },
                { nis: '103', name: 'CITRA LESTARI' }
            ];

            list.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${mockStudents.map(s => `
                        <div class="p-4 border border-slate-100 rounded-2xl bg-slate-50/50 flex flex-col gap-3">
                            <div class="text-left">
                                <p class="text-[9px] font-black text-blue-500">${s.nis}</p>
                                <p class="font-bold text-slate-900 text-sm">${s.name}</p>
                            </div>
                            <div class="grid grid-cols-4 gap-1">
                                <button class="p-2 text-[10px] font-bold rounded-lg border bg-white hover:bg-emerald-500 hover:text-white transition">H</button>
                                <button class="p-2 text-[10px] font-bold rounded-lg border bg-white hover:bg-blue-500 hover:text-white transition">I</button>
                                <button class="p-2 text-[10px] font-bold rounded-lg border bg-white hover:bg-amber-500 hover:text-white transition">S</button>
                                <button class="p-2 text-[10px] font-bold rounded-lg border bg-white hover:bg-rose-500 hover:text-white transition">A</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="mt-8 pt-6 border-t border-slate-100">
                    <button onclick="alert('Data berhasil disimpan!')" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold text-sm shadow-xl active:scale-95 transition-all">Simpan Laporan</button>
                </div>
            `;
        }

        function renderRekap(container) {
            container.innerHTML = `
                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-slate-900">Laporan Bulanan</h3>
                        <button class="text-blue-600 font-bold text-xs">UNDUH EXCEL</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase">
                                <tr>
                                    <th class="p-4">Siswa</th>
                                    <th class="p-4 text-center">Hadir</th>
                                    <th class="p-4 text-center">Izin</th>
                                    <th class="p-4 text-center">Alpa</th>
                                    <th class="p-4 text-right">Persentase</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
                                <tr class="border-b border-slate-50">
                                    <td class="p-4 font-bold">Aditya Pratama</td>
                                    <td class="p-4 text-center">20</td>
                                    <td class="p-4 text-center">2</td>
                                    <td class="p-4 text-center text-rose-500 font-bold">0</td>
                                    <td class="p-4 text-right font-black text-emerald-600">98%</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderPlaceholder(container, title) {
            container.innerHTML = `
                <div class="bg-white rounded-3xl p-20 border border-slate-200 text-center shadow-sm">
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i data-lucide="construction" class="text-slate-300 w-10 h-10"></i>
                    </div>
                    <h3 class="font-bold text-xl text-slate-900">Modul ${title}</h3>
                    <p class="text-slate-500 text-sm mt-2">Fungsi ini sedang disiapkan untuk rilis berikutnya.</p>
                </div>
            `;
            lucide.createIcons();
        }
    </script>
</body>
</html>
